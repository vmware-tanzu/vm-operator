    license: "Foundation Agreement\n\n1. INTRODUCTION\n\n1.1. This Foundation Agreement
      (“Foundation Agreement”) between the applicable Regional Broadcom Entity set
      forth in the referencing Transaction Document, a Broadcom Inc. company, (“Broadcom”),
      and your organization, (“Customer”), is effective on the date set forth in the
      referencing Transaction Document which identifies the “Start Date” and specifies
      the terms and conditions agreed between the Parties as a foundation for their
      relationship as further defined in the applicable Modules.\n\n1.2. With respect
      to the Broadcom Offering, additional terms shall be included in a Module, while
      terms specific to each individual order from Customer or Broadcom Partner shall
      be set forth in the Transaction Document(s) for such order.\n\n1.3. This Foundation
      Agreement may incorporate any applicable Module referenced in the “Governing
      Contract” section of the applicable Transaction Document.\n\n2. DEFINITIONS\n\n2.1.
      “Agreement” means this Foundation Agreement, the applicable Module, the applicable
      Transaction Document, and any document incorporated expressly therein by reference.\n\n2.2.
      “Affiliate” means any person or entity which directly or indirectly owns, controls,
      is controlled by, or is under common control with a party, where control is
      defined as owning or directing more than fifty percent (50%) of the voting equity
      securities or a similar ownership interest in the controlled entity.\n\n2.3.
      “Broadcom Offering” means the individual offering (such as software, services,
      education, software as a service, or support) in the CA, Symantec, or VMware
      product families.\n\n2.4. “Broadcom Partner” means a Broadcom authorized channel
      partner selected by the Customer.\n\n2.5. \"Broadcom Software” means the computer
      software programs in the CA, Symantec, or VMware product families made generally
      available and licensed to Customer under the applicable Module pursuant to the
      applicable Transaction Document. Broadcom Software may be provided individually
      or packaged as a software appliance and includes all versions and releases provided
      as part of Broadcom Maintenance, if applicable.\n\n2.6. “Confidential Information”
      means any information, maintained in confidence by the disclosing Party, communicated
      in written or oral form, marked as proprietary, confidential, or otherwise so
      identified, or any information that by its form, nature, content, or mode of
      transmission would be deemed confidential or proprietary to a reasonable recipient,
      including, without limitation, Broadcom Offerings, Documentation, the Agreement,
      Transaction Documents, Broadcom provided pricing, and any benchmarking data
      or results.\n\n2.7. “Documentation” means the technical product specifications
      or user manuals published by Broadcom or a Broadcom Affiliate.\n\n2.8. “Module”
      means the additional terms and conditions applicable to a Broadcom Offering.
      If a Broadcom Offering includes both on-premises software and SaaS, then each
      applicable Module applies.\n\n2.9. “Party” or “Parties” means individually and/or
      collectively Broadcom and/or the Customer.\n\n2.10. “Personal Data” means any
      information relating to (i) an identified or identifiable person and, (ii) an
      identified or identifiable legal entity (where such information is protected
      similarly as personal data or personally identifiable information under applicable
      data protection laws), provided in connection with the Agreement.\n\n2.11. “Taxes”
      means any applicable sales tax, value-added tax (VAT), goods and services tax
      (GST), consumption tax, ISS, PIS and COFINS or any other applicable taxes.\n\n2.12.
      “Term” means the period during which the Broadcom Offering is provided as specified
      in the Transaction Document.\n\n2.13. “Transaction Document”, “Order Form”,
      or “Order” means a mutually agreed ordering document such as a Broadcom quote,
      order form, or statement of work for the specific Broadcom Offering licensed
      or purchased. Either Transaction Documents are executed or, in the case of a
      quote and purchase order (“PO”), a PO referencing such quote is issued and that
      issuance constitutes acceptance of the quote and formation of contract.\n\n3.
      ORDERING AND DELIVERY\n\n3.1. Under the terms of this Agreement and subject
      to the terms of the applicable Module(s), Customer and any Customer Affiliate
      incorporated in the same jurisdiction as Customer, may purchase Broadcom Offerings
      directly from Broadcom or through a Broadcom Partner, and Broadcom shall provide
      the specific Broadcom Offering. All Customer Affiliates incorporated in a different
      jurisdiction than Customer, must sign a participation agreement with Broadcom
      to adopt and adhere to the terms of this Agreement.\n\n3.2. The Broadcom Offerings,
      (and any hardware components if included within your Transaction Document),
      will be delivered either in tangible media FCA SD (FCA Shipping Dock), as defined
      in INCOTERMS 2020, from Broadcom’s shipping point as indicated in the Transaction
      Document or by electronic delivery (ESD). Customer agrees to be responsible
      for all customs, duties, import clearances, title, and risk of loss to any Broadcom
      hardware, if included, will pass upon point of delivery to Customer’s carrier
      at Broadcom’s shipping location. For non-US customers, title to the hardware
      product transfers when the product leaves the national territory of the US.\n\n3.3.
      In the event of a payment or set off issue relating to one Broadcom Offering,
      such payment issue will not impact any other obligation to pay for any Broadcom
      Offering provided to Customer.\n\n4. CONFIDENTIALITY\n\n4.1. The Parties agree
      that, when receiving Confidential Information from the disclosing Party, the
      receiving Party shall hold it in confidence and shall not disclose nor use such
      information except as necessary to carry out the purpose of this Agreement.
      The receiving Party shall treat the disclosing Party’s Confidential Information
      confidentially and in the same manner as it treats its own proprietary and/or
      confidential information, which shall not be less than a reasonable standard
      of care. Confidential Information may be disclosed to receiving Party’s employees,
      affiliates, agents, financial advisors, contractors, and attorneys on a need-to
      know basis and the receiving Party shall ensure that such persons preserve and
      use such Confidential Information pursuant to the terms of the Agreement.\n\n4.2.
      The receiving Party may disclose Confidential Information in connection with
      a judicial or administrative proceeding to the extent that such disclosure is
      required under applicable law or court order, provided that the receiving Party
      shall, where reasonably possible, give the disclosing Party prompt and timely
      written notice of any such proceeding and shall offer reasonable cooperation
      in any effort of the disclosing Party to obtain a protective order.\n\n4.3.
      For the purposes of the Agreement, Confidential Information excludes: (i) information
      which the receiving Party has been authorized in writing by the disclosing Party
      to disclose without restriction; (ii) information which was rightfully in the
      receiving Party’s possession or rightfully known to it prior to receipt of such
      information from the disclosing Party; (iii) information which was rightfully
      disclosed to the receiving Party by a third party having proper possession of
      such information, without restriction; (iv) information which is part of or
