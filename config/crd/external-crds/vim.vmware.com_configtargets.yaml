---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: configtargets.vim.vmware.com
spec:
  group: vim.vmware.com
  names:
    kind: ConfigTarget
    listKind: ConfigTargetList
    plural: configtargets
    singular: configtarget
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ConfigTarget is the schema for the ConfigTarget API and represents the
          desired state and observed status of a ConfigTarget resource.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ConfigTargetSpec defines the desired state of a ConfigTarget.
            properties:
              id:
                description: ID is the managed object ID of the vSphere cluster.
                properties:
                  id:
                    description: ID is the object's ID.
                    type: string
                  serverID:
                    description: ServerID is the ID of the server to which the object
                      belongs.
                    type: string
                required:
                - id
                type: object
            required:
            - id
            type: object
          status:
            description: ConfigTargetStatus defines the observed state of a ConfigTarget.
            properties:
              availablePersistentMemoryReservation:
                anyOf:
                - type: integer
                - type: string
                description: |-
                  AvailablePersistentMemoryReservation describes the maximum available
                  persistent memory reservation on a compute resource.
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              cdrom:
                description: CDROM describes the desired state for available CD-ROM
                  devices.
                items:
                  properties:
                    description:
                      description: Description of the physical device. This is set
                        only by the server.
                      type: string
                    name:
                      description: Name is the device name.
                      type: string
                  type: object
                type: array
              conditions:
                description: |-
                  Conditions describes the observed state of any conditions
                  associated with this object.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              defaultHardwareVersion:
                description: |-
                  DefaultHardwareVersion describes the default hardware version supported
                  by the config target.
                type: string
              dvxClassInfo:
                description: |-
                  DVXClassInfo describes the desired state for Device Virtualization
                  Extensions (DVX) classes.
                items:
                  description: |-
                    VirtualMachineDvxClassInfo describes a Device Virtualization Extensions
                    (DVX) device class.
                  properties:
                    configParams:
                      description: |-
                        ConfigParams are the configuration parameters for this DVX device
                        class.
                      items:
                        description: |-
                          OptionDef describes a single configuration option definition with its
                          associated type.
                          It corresponds to vim.option.OptionDef.
                        properties:
                          optionType:
                            description: OptionType describes the type and valid values
                              for this option.
                            type: object
                            x-kubernetes-preserve-unknown-fields: true
                        required:
                        - optionType
                        type: object
                      type: array
                    deviceClass:
                      description: DeviceClass is the DVX device class.
                      properties:
                        evcMode:
                          description: EVCMode contains data specific to a vim.EVCMode.
                          properties:
                            featureCapability:
                              description: |-
                                FeatureCapability describes the feature capability baseline guaranteed
                                on a cluster where this EVC mode is configured.
                              items:
                                description: |-
                                  HostFeatureCapability describes a feature that a host is capable of
                                  providing at a particular value.
                                  It corresponds to vim.host.FeatureCapability.
                                properties:
                                  featureName:
                                    description: FeatureName is the name of the feature.
                                      Identical to Key.
                                    type: string
                                  key:
                                    description: Key is the accessor name for the
                                      feature capability.
                                    type: string
                                  value:
                                    description: Value is the opaque value the feature
                                      is capable of.
                                    type: string
                                required:
                                - featureName
                                - key
                                - value
                                type: object
                              type: array
                            featureMask:
                              description: |-
                                FeatureMask contains the masks that limit a host's capabilities to the
                                EVC mode baseline.
                              items:
                                description: |-
                                  HostFeatureMask describes a mask applied to a host feature capability
                                  to enforce a specific value for EVC compatibility.
                                  It corresponds to vim.host.FeatureMask.
                                properties:
                                  featureName:
                                    description: FeatureName is the name of the feature.
                                      Identical to Key.
                                    type: string
                                  key:
                                    description: Key is the accessor name for the
                                      feature mask.
                                    type: string
                                  value:
                                    description: |-
                                      Value is the opaque value to apply to the host feature capability.
                                      The masking operation is encoded in the value.
                                    type: string
                                required:
                                - featureName
                                - key
                                - value
                                type: object
                              type: array
                            featureRequirement:
                              description: |-
                                FeatureRequirement contains the host feature capability conditions that
                                must be met for the EVC mode baseline.
                              items:
                                description: |-
                                  VirtualMachineFeatureRequirement describes a feature requirement for
                                  a virtual machine as a key/name/value triple.
                                  It corresponds to vim.vm.FeatureRequirement.
                                properties:
                                  featureName:
                                    description: FeatureName is the name of the feature.
                                      Identical to Key.
                                    type: string
                                  key:
                                    description: Key is the accessor name for the
                                      feature requirement test.
                                    type: string
                                  value:
                                    description: |-
                                      Value is the opaque value for the feature operation. The
                                      operation is encoded in the value.
                                    type: string
                                required:
                                - featureName
                                - key
                                - value
                                type: object
                              type: array
                            guaranteedCPUFeatures:
                              description: |-
                                GuaranteedCPUFeatures describes the CPU feature baseline for this EVC
                                mode.

                                Deprecated: As of vSphere API 6.5, use FeatureCapability instead.
                              items:
                                description: |-
                                  HostCpuIdInfo represents CPU features of a host or the CPU feature
                                  requirements of a virtual machine, expressed as CPUID bit masks.
                                  It corresponds to vim.host.CpuIdInfo.

                                  Deprecated: As of vSphere API 5.1, use HostFeatureMask for host
                                  masking and for virtual machines with hardware version 9 or later.
                                properties:
                                  eax:
                                    description: Eax is the bit mask string for the
                                      EAX CPUID register.
                                    type: string
                                  ebx:
                                    description: Ebx is the bit mask string for the
                                      EBX CPUID register.
                                    type: string
                                  ecx:
                                    description: Ecx is the bit mask string for the
                                      ECX CPUID register.
                                    type: string
                                  edx:
                                    description: Edx is the bit mask string for the
                                      EDX CPUID register.
                                    type: string
                                  level:
                                    description: Level is the CPUID input level (EAX
                                      value passed to CPUID).
                                    format: int32
                                    type: integer
                                  vendor:
                                    description: Vendor restricts this mask to a specific
                                      CPU vendor when set.
                                    type: string
                                required:
                                - level
                                type: object
                              type: array
                            track:
                              description: |-
                                Track contains identifiers for feature groups that are at least
                                partially present in the guaranteed features for this mode. Use this
                                only for feature-superset comparisons, not to infer specific feature
                                presence.
                              items:
                                type: string
                              type: array
                            vendor:
                              description: Vendor is the CPU hardware vendor required
                                for this mode.
                              type: string
                            vendorTier:
                              description: |-
                                VendorTier is the ordering index for the set of modes that apply to a
                                given CPU vendor. Use this only for feature-superset comparisons, not
                                to infer specific feature presence.
                              format: int32
                              type: integer
                          required:
                          - track
                          - vendor
                          - vendorTier
                          type: object
                        extendedElementDescription:
                          description: |-
                            ExtendedElementDescription contains data specific to a
                            vim.ExtendedElementDescription.
                          properties:
                            messageArg:
                              description: |-
                                MessageArg provides named arguments used to substitute parameters in
                                the localized message string.
                              items:
                                description: |-
                                  KeyAnyValue is a non-localized key/value pair where the value is
                                  represented as a string.
                                  It corresponds to vmodl.KeyAnyValue.
                                properties:
                                  key:
                                    description: Key is the key.
                                    type: string
                                  value:
                                    description: Value is the value, represented as
                                      a string.
                                    type: string
                                required:
                                - key
                                - value
                                type: object
                              type: array
                            messageCatalogKeyPrefix:
                              description: |-
                                MessageCatalogKeyPrefix is the key to the localized message string in
                                the catalog. The label and summary in the parent BaseElementDescription
                                correspond to catalog entries at "<key>.label" and "<key>.summary"
                                respectively.
                              type: string
                          required:
                          - messageCatalogKeyPrefix
                          type: object
                        featureEvcMode:
                          description: FeatureEVCMode contains data specific to a
                            vim.FeatureEVCMode.
                          properties:
                            capability:
                              description: |-
                                Capability describes the feature capability baseline guaranteed on a
                                cluster where this EVC mode is configured.
                              items:
                                description: |-
                                  HostFeatureCapability describes a feature that a host is capable of
                                  providing at a particular value.
                                  It corresponds to vim.host.FeatureCapability.
                                properties:
                                  featureName:
                                    description: FeatureName is the name of the feature.
                                      Identical to Key.
                                    type: string
                                  key:
                                    description: Key is the accessor name for the
                                      feature capability.
                                    type: string
                                  value:
                                    description: Value is the opaque value the feature
                                      is capable of.
                                    type: string
                                required:
                                - featureName
                                - key
                                - value
                                type: object
                              type: array
                            mask:
                              description: |-
                                Mask contains the masks that limit a host's capabilities to the EVC
                                mode baseline.
                              items:
                                description: |-
                                  HostFeatureMask describes a mask applied to a host feature capability
                                  to enforce a specific value for EVC compatibility.
                                  It corresponds to vim.host.FeatureMask.
                                properties:
                                  featureName:
                                    description: FeatureName is the name of the feature.
                                      Identical to Key.
                                    type: string
                                  key:
                                    description: Key is the accessor name for the
                                      feature mask.
                                    type: string
                                  value:
                                    description: |-
                                      Value is the opaque value to apply to the host feature capability.
                                      The masking operation is encoded in the value.
                                    type: string
                                required:
                                - featureName
                                - key
                                - value
                                type: object
                              type: array
                            requirement:
                              description: |-
                                Requirement contains the host feature capability conditions that must
                                be met for the EVC mode baseline.
                              items:
                                description: |-
                                  VirtualMachineFeatureRequirement describes a feature requirement for
                                  a virtual machine as a key/name/value triple.
                                  It corresponds to vim.vm.FeatureRequirement.
                                properties:
                                  featureName:
                                    description: FeatureName is the name of the feature.
                                      Identical to Key.
                                    type: string
                                  key:
                                    description: Key is the accessor name for the
                                      feature requirement test.
                                    type: string
                                  value:
                                    description: |-
                                      Value is the opaque value for the feature operation. The
                                      operation is encoded in the value.
                                    type: string
                                required:
                                - featureName
                                - key
                                - value
                                type: object
                              type: array
                          type: object
                        key:
                          description: Key is the enumeration or literal ID being
                            described.
                          type: string
                        label:
                          description: Label is the display label.
                          type: string
                        optionDef:
                          description: OptionDef contains data specific to a vim.OptionDef.
                          properties:
                            optionType:
                              description: OptionType describes the type and valid
                                values for this option.
                              type: object
                              x-kubernetes-preserve-unknown-fields: true
                          required:
                          - optionType
                          type: object
                        summary:
                          description: Summary is the summary description.
                          type: string
                        type:
                          description: Type is the type of the element description.
                          type: string
                      required:
                      - key
                      - label
                      - summary
                      - type
                      type: object
                    sriovNic:
                      description: SriovNic indicates whether the devices of this
                        class are SR-IOV NICs.
                      type: boolean
                    vendorName:
                      description: |-
                        VendorName is the label for the vendor name of this class.
                        The value is defined by vendors of the DVX device class as part of
                        their localizable messages.
                      type: string
                  required:
                  - deviceClass
                  - sriovNic
                  - vendorName
                  type: object
                type: array
              dynamicPassthroughDevices:
                description: |-
                  DynamicPassthroughDevices describes the desired state for available
                  dynamic DirectPath PCI devices.
                items:
                  description: |-
                    VirtualMachineDynamicPassthroughInfo describes a dynamic DirectPath
                    PCI device.
                  properties:
                    customLabel:
                      description: CustomLabel is the custom label attached to this
                        PCI device.
                      type: string
                    deviceID:
                      description: DeviceID is the PCI device ID for this device.
                      format: int32
                      type: integer
                    deviceName:
                      description: DeviceName is the device name of this PCI device.
                      type: string
                    name:
                      description: Name is the device name.
                      type: string
                    vendorID:
                      description: VendorID is the PCI vendor ID for this device.
                      format: int32
                      type: integer
                    vendorName:
                      description: VendorName is the vendor name of this PCI device.
                      type: string
                  required:
                  - deviceID
                  - deviceName
                  - vendorID
                  - vendorName
                  type: object
                type: array
              floppy:
                description: Floppy describes the desired state for available floppy
                  devices.
                items:
                  properties:
                    name:
                      description: Name is the device name.
                      type: string
                  type: object
                type: array
              ideDisks:
                description: |-
                  IDEDisks describes the desired state for physical IDE disks
                  available as raw disk targets.
                items:
                  description: |-
                    VirtualMachineIdeDiskDeviceInfo contains detailed information about a
                    specific IDE disk hardware device.
                    These devices are for VirtualDisk RawDiskVer2BackingInfo and
                    PartitionedRawDiskVer2BackingInfo backings.
                  properties:
                    capacity:
                      anyOf:
                      - type: integer
                      - type: string
                      description: Capacity is the size of the disk.
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    name:
                      description: Name is the device name.
                      type: string
                    partitionTable:
                      description: PartitionTable describes the partitions on this
                        disk.
                      items:
                        description: |-
                          VirtualMachineIdeDiskDevicePartitionInfo describes the size of a single
                          partition on an IDE disk.
                        properties:
                          capacity:
                            anyOf:
                            - type: integer
                            - type: string
                            description: Capacity is the size of the partition.
                            pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                            x-kubernetes-int-or-string: true
                          id:
                            description: ID is the identification of the partition.
                            format: int32
                            type: integer
                        required:
                        - id
                        type: object
                      type: array
                  type: object
                type: array
              maxCPUsPerVM:
                description: |-
                  MaxCPUsPerVM describes the maximum number of CPUs a single VM may
                  be assigned.
                format: int32
                type: integer
              maxHardwareVersion:
                description: |-
                  MaxHardwareVersion describes the maximum hardware version supported by
                  the config target.
                type: string
              maxMemOptimalPerf:
                anyOf:
                - type: integer
                - type: string
                description: MaxMemOptimalPerf describes the maximum recommended memory
                  size.
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              maxSimultaneousThreads:
                description: MaxSimultaneousThreads describes the maximum SMT threads
                  available.
                format: int32
                type: integer
              numCPUCores:
                description: NumCPUCores describes the number of physical CPU cores
                  available.
                format: int32
                type: integer
              numCPUs:
                description: |-
                  NumCPUs describes the number of logical CPUs available to run
                  virtual machines.
                format: int32
                type: integer
              numNumaNodes:
                description: NumNumaNodes describes the total number of NUMA nodes
                  available.
                format: int32
                type: integer
              observedGeneration:
                description: |-
                  ObservedGeneration describes the observed state of the
                  metadata.generation field at the time this object was last
                  reconciled by its primary controller.
                format: int64
                type: integer
              parallel:
                description: |-
                  Parallel describes the desired state for available parallel
                  port devices.
                items:
                  properties:
                    name:
                      description: Name is the device name.
                      type: string
                  type: object
                type: array
              pciPassthrough:
                description: |-
                  PCIPassthrough describes the desired state for available PCI
                  passthrough devices.
                items:
                  description: |-
                    VirtualMachinePCIPassthroughInfo describes a generic PCI device that can
                    be attached to a virtual machine.
                  properties:
                    id:
                      description: ID is composed of systemID:pciDevice.id.
                      type: string
                    name:
                      description: Name is the device name.
                      type: string
                    pciDevice:
                      description: |-
                        PciDevice describes the PCI device, including vendor, class, and
                        device identification information.
                      properties:
                        bus:
                          description: Bus is the bus ID of this PCI device.
                          format: int32
                          type: integer
                        classId:
                          description: ClassId is the class of this PCI device.
                          format: int32
                          type: integer
                        deviceClassName:
                          description: |-
                            DeviceClassName is the name for the PCI device class (e.g.
                            "Host bridge", "iSCSI device", "Fibre channel HBA").
                          type: string
                        deviceId:
                          description: |-
                            DeviceId is the device ID of this PCI device.

                            The device ID may be negative. vSphere uses an unsigned short to
                            represent it; the WSDL representation uses a signed short. Values
                            greater than 32767 are converted to two's complement. When
                            specifying VirtualPCIPassthroughDeviceBackingInfo.deviceId, use
                            the retrieved HostPciDevice.deviceId value and convert it to a
                            string.
                          format: int32
                          type: integer
                        deviceName:
                          description: DeviceName is the device name of this PCI device.
                          type: string
                        function:
                          description: Function is the function ID of this PCI device.
                          format: int32
                          type: integer
                        id:
                          description: Id is the name ID of this PCI, composed of
                            "bus:slot.function".
                          type: string
                        name:
                          description: Name is the device name.
                          type: string
                        parentBridge:
                          description: ParentBridge is the parent bridge of this PCI
                            device.
                          type: string
                        physicalSlot:
                          description: PhysicalSlot is the physical slot number of
                            this PCI device.
                          format: int32
                          type: integer
                        slot:
                          description: Slot is the slot ID of this PCI device.
                          format: int32
                          type: integer
                        slotDescription:
                          description: SlotDescription is the description of the slot.
                          type: string
                        subDeviceId:
                          description: |-
                            SubDeviceId is the subdevice ID of this PCI device.

                            The subdevice ID may be negative. vSphere uses an unsigned short to
                            represent it; the WSDL representation uses a signed short. Values
                            greater than 32767 are converted to two's complement.
                          format: int32
                          type: integer
                        subVendorId:
                          description: |-
                            SubVendorId is the subvendor ID of this PCI device.

                            The subvendor ID may be negative. vSphere uses an unsigned short to
                            represent it; the WSDL representation uses a signed short. Values
                            greater than 32767 are converted to two's complement.
                          format: int32
                          type: integer
                        vendorId:
                          description: |-
                            VendorId is the vendor ID of this PCI device.

                            The vendor ID may be negative. vSphere uses an unsigned short to
                            represent it; the WSDL representation uses a signed short. Values
                            greater than 32767 are converted to two's complement. When
                            specifying VirtualPCIPassthroughDeviceBackingInfo.vendorId, use
                            the retrieved HostPciDevice.vendorId value directly.
                          format: int32
                          type: integer
                        vendorName:
                          description: VendorName is the vendor name of this PCI device.
                          type: string
                      required:
                      - bus
                      - classId
                      - deviceId
                      - deviceName
                      - function
                      - id
                      - slot
                      - subDeviceId
                      - subVendorId
                      - vendorId
                      - vendorName
                      type: object
                    systemID:
                      description: SystemID is the ID of the system to which the PCI
                        device is attached.
                      type: string
                  required:
                  - id
                  - pciDevice
                  - systemID
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - id
                x-kubernetes-list-type: map
              precisionClockInfo:
                description: |-
                  PrecisionClockInfo describes the desired state for host clock
                  resources used by virtual precision clocks.
                items:
                  description: VirtualMachinePrecisionClockInfo describes host clock
                    resources for precision clocks.
                  properties:
                    name:
                      description: Name is the device name.
                      type: string
                    systemClockProtocol:
                      description: SystemClockProtocol is the clock protocol (e.g.,
                        "PTP", "NTP").
                      type: string
                  type: object
                type: array
              scsiDisks:
                description: |-
                  SCSIDisks describes the desired state for physical SCSI disks
                  available as raw disk mapping targets.
                items:
                  description: |-
                    VirtualMachineScsiDiskDeviceInfo contains detailed information about a
                    specific SCSI disk hardware device.
                    These devices are for VirtualDisk RawDiskMappingVer1BackingInfo.
                  properties:
                    capacity:
                      anyOf:
                      - type: integer
                      - type: string
                      description: Capacity is the size of the disk.
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    disk:
                      description: Disk contains detailed information about the SCSI
                        disk.
                      properties:
                        canonicalName:
                          description: CanonicalName is the canonical name of the
                            SCSI LUN.
                          type: string
                        capacity:
                          description: |-
                            Capacity is the size of the SCSI disk using the Logical Block
                            Addressing scheme.
                          properties:
                            block:
                              description: Block is the number of blocks.
                              format: int64
                              type: integer
                            blockSize:
