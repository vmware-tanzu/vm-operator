deploymentOptionSection:
  configuration:
  - description: This will deploy a Internal Minimal VM configured with 2 vCPUs and
      12.5 GB of memory and requires 604 GB of disk space. This option contains vCenter
      Server with an embedded Platform Services Controller for managing up to 10 hosts
      and 100 VMs.
    id: internal-minimal
    label: Internal Minimal vCenter Server with Embedded PSC
  - default: true
    description: This will deploy a Tiny VM configured with 2 vCPUs and 14 GB of memory
      and requires 604 GB of disk space. This option contains vCenter Server with
      an embedded Platform Services Controller for managing up to 10 hosts and 100
      VMs.
