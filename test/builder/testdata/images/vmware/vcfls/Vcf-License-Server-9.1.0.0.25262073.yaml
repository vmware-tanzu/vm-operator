        type: string
        userConfigurable: true
    - property:
        description: |
          You can get the unique registration key from VCF Operations under licensing:
          1. Open VMware Cloud Foundation Operations service.
          2. Navigate to Licensing > Licenses & Registration > Manage > License Servers > Add License Server
          3. Copy the generated OTK
