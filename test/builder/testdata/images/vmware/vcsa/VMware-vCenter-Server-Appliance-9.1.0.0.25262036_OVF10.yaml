      constitutes a trade secret under applicable law, the obligations of this section
      will continue for so long as such trade secret status is maintained by the disclosing
      Party. For all other Confidential Information, the foregoing obligations shall
      extend for five (5) years from the date of initial disclosure.\n\n5. FEES\n\n5.1.
      To the extent permitted by law, Customer shall issue and provide Broadcom a
      purchase order (“PO”), or a series of POs, for the full term and total fees
      that are due contemporaneously with the execution of each Transaction Document.
      Broadcom, directly or through a Broadcom Partner, reserves the right to invoice
      Customer for any use of the Broadcom Offerings in excess of the Authorized Use
      Limitation at Broadcom’s then-current list price.\n\n5.2. Unless an alternative
      date of payment is set out on the Transaction Document, payment is due upon
      the due date specified on the invoice. Customer agrees to pay Taxes in addition
      to the fees when such payments are due. Customer (a) may only withhold tax as
      required by law, subject to the application of any reduced rate allowed in an
      income tax treaty or otherwise, (b) shall request all documentation required
      for the reduction of withholding tax, and (c) shall provide proof of payment
      of the withholding tax for credit relative to the applicable invoice(s).\n\n5.3.
      If indicated on the Transaction Document, Customer may pay any initial payment
      due to Broadcom on or before the due date (as stated in the applicable Transaction
      Document) through a same day fed wire. For other payments required of Customer
      due to Broadcom, Broadcom will send Customer an invoice containing updated wire
      transfer information at least thirty (30) days prior to each respective due
      date. Broadcom reserves the right to change credit or payment terms at Broadcom’s
      discretion if Customer’s or Broadcom Partner’s financial condition or previous
      payment history so warrant.\n\n5.4. A Customer issued PO may be used to accept
      terms of a Transaction Document in place of a signature on the Transaction Document,
      provided that Customer references the Transaction Document in the PO and includes
      the appropriate reference number, if applicable.\n\n5.5. If a payment due date
      falls on a weekend or a holiday the payment shall be payable by Customer to
      Broadcom on the business day immediately prior to such date.\n\n5.6. Failure
      to timely remit payment of all amounts set forth in a Transaction Document or
      under any other agreement with any Broadcom entity after written notice from
      Broadcom and a reasonable opportunity to remit such payment by Customer and
      to the full extent permitted by applicable law, shall (1) relieve Broadcom of
      any support obligations hereunder, and (2) suspend all Customer subscription
      use rights until payment is tendered at which time use rights and support shall
      recommence. Broadcom reserves the right to impose late fees as may be permitted
      by law on any past due amounts.\n\n5.7. Broadcom may assign its payment rights
      in, or grant a security interest in, this Agreement and any associated Transaction
