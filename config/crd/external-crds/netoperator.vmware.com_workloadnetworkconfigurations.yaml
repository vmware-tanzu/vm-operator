---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: workloadnetworkconfigurations.netoperator.vmware.com
spec:
  group: netoperator.vmware.com
  names:
    kind: WorkloadNetworkConfiguration
    listKind: WorkloadNetworkConfigurationList
    plural: workloadnetworkconfigurations
    singular: workloadnetworkconfiguration
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          WorkloadNetworkConfiguration is a singleton cluster-scoped resource that describes the
          network providers available in this Supervisor and which provider is currently active for
          system-level networking.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of this WorkloadNetworkConfiguration.
            properties:
              activeSystemProvider:
                description: |-
                  activeSystemProvider identifies which provider in the providers list is currently
                  authoritative for deriving the system NamespaceNetworkConfiguration. Changing this
                  field triggers a transition of the system NNC to the newly active provider.
                enum:
                - vsphere-distributed
                - nsx-tier1
                - vpc
                type: string
              providers:
                description: |-
                  providers declares the set of network providers and their system-level configurations.
                  Each entry must have a unique type. At least one provider must be declared.
                items:
                  description: |-
                    NetworkProviderEntry pairs a network provider type with its system-level
                    NamespaceNetworkConfiguration template. Exactly one entry per type is allowed
                    (enforced via listType=map on the providers field).
                  properties:
                    systemConfiguration:
                      description: systemConfiguration holds the provider-specific
                        NNC template for this provider.
                      properties:
                        vpcConfig:
                          description: |-
                            vpcConfig contains the VPC network configuration.
                            Required when type is vpc.
                          minProperties: 1
                          properties:
                            autoCreateConfig:
                              description: |-
                                autoCreateConfig holds the configuration for automatically creating a
                                namespace-scoped VPC. Mutually exclusive with vpc.
                              properties:
                                nsxProject:
                                  description: |-
                                    nsxProject is the NSX policy path of the Project the namespace is
                                    associated with. This field is immutable once set.

                                    NSX Projects provide multi-tenancy by partitioning networking and
                                    security configurations within a single NSX deployment.
                                  maxLength: 2048
                                  minLength: 1
                                  type: string
                                privateCIDRs:
                                  description: |-
                                    privateCIDRs specifies CIDR blocks from which private Subnets are
                                    allocated for this namespace. These ranges should not overlap with:
                                      - CIDRs in the VPC connectivity profile
                                      - Kubernetes service CIDRs
                                      - Other services running in the datacenter

                                    This field is append-only; existing entries may not be removed.
                                  items:
                                    maxLength: 64
                                    pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$
                                    type: string
                                  maxItems: 16
                                  type: array
                                  x-kubernetes-list-type: atomic
                                vpcConnectivityProfile:
                                  description: |-
                                    vpcConnectivityProfile is the NSX policy path of the VPC Connectivity
                                    Profile. This profile defines northbound connectivity configuration
                                    for VPCs including:
                                      - Transit Gateway attachment
                                      - External IP blocks (for public subnets and external IP bindings)
                                      - Private Transit Gateway IP blocks (for inter-VPC communication)

                                    This field is immutable once set.
                                  maxLength: 2048
                                  minLength: 1
                                  type: string
                              required:
                              - nsxProject
                              - vpcConnectivityProfile
                              type: object
                              x-kubernetes-validations:
                              - message: nsxProject is immutable once set
                                rule: '!has(oldSelf.nsxProject) || self.nsxProject
                                  == oldSelf.nsxProject'
                              - message: vpcConnectivityProfile is immutable once
                                  set
                                rule: '!has(oldSelf.vpcConnectivityProfile) || self.vpcConnectivityProfile
                                  == oldSelf.vpcConnectivityProfile'
                              - message: privateCIDRs is append-only; existing entries
                                  cannot be removed
                                rule: '!has(oldSelf.privateCIDRs) || oldSelf.privateCIDRs.all(cidr,
                                  self.privateCIDRs.exists(c, c == cidr))'
                            defaultSubnetSize:
                              description: |-
                                defaultSubnetSize is the default size of Namespace Subnets, specified as
                                the number of IP addresses. Must be a power of 2 (e.g. 16, 32, 64, 128).
                                When not set, defaults to 32 (equivalent to a /27 subnet).
                              format: int32
                              maximum: 65536
                              minimum: 1
                              type: integer
                              x-kubernetes-validations:
                              - message: defaultSubnetSize must be a power of 2 (e.g.
                                  1, 2, 4, 8, 16, 32, 64, 128, 256, 512, 1024, 2048,
                                  4096, 8192, 16384, 32768, 65536)
                                rule: self == 0 || self in [1, 2, 4, 8, 16, 32, 64,
                                  128, 256, 512, 1024, 2048, 4096, 8192, 16384, 32768,
                                  65536]
                            sharedSubnets:
                              description: |-
                                sharedSubnets lists pre-created Subnets to be associated with this
                                Namespace. At most one entry may have podDefault set to True, and at
                                most one entry may have vmDefault set to True. These constraints are
                                enforced by validation rules; the API server will reject any update
                                that sets podDefault or vmDefault to True on more than one entry.

                                A Subnet that is currently in use cannot be removed. If all shared Subnets
                                acting as a Pod or VM default are removed, the default network falls back
                                to Subnets generated from the Namespace VPC's available address space. If
                                no such space exists, the affected workload type is not assigned a default
                                network.
                              items:
                                description: SharedSubnet defines a pre-created Subnet
                                  to be associated with a Namespace.
                                properties:
                                  name:
                                    description: |-
                                      name is the name of the Subnet CR for this shared Subnet.
                                      It uniquely identifies this entry in the sharedSubnets list and must be
                                      unique across all entries. This field is immutable.
                                    maxLength: 253
                                    minLength: 1
                                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                                    type: string
                                  path:
                                    description: |-
                                      path is the NSX policy path of the shared Subnet to be associated with
                                      this Namespace. This field is immutable once set.
                                    maxLength: 2048
                                    minLength: 1
                                    type: string
                                  podDefault:
                                    description: |-
                                      podDefault indicates this Subnet is the default network for Pod workloads
                                      in this Namespace. At most one entry in sharedSubnets may be set to True.
                                      When unset, this Subnet is not a Pod default. When set to True, vpc must
                                      be set on the parent VPCConfig, as the Subnet must reside in the
                                      Namespace's VPC to support resources such as load balancer virtual
                                      services and static routes.

                                      If no shared Subnet has podDefault set to True and the Namespace VPC has
                                      sufficient PrivateTGW IP block space, Pods use Subnets generated from
                                      that block. Otherwise, Pods are not assigned a default network.
                                    enum:
                                    - "True"
                                    - "False"
                                    type: string
                                  vmDefault:
                                    description: |-
                                      vmDefault indicates this Subnet is the default network for VM workloads
                                      in this Namespace. At most one entry in sharedSubnets may be set to True.
                                      When unset, this Subnet is not a VM default. When set to True, vpc must
                                      be set on the parent VPCConfig, as the Subnet must reside in the
                                      Namespace's VPC to support resources such as load balancer virtual
                                      services and static routes.

                                      If no shared Subnet has vmDefault set to True and the Namespace VPC has
                                      sufficient privateCIDR space, VMs use Subnets generated from those CIDRs.
                                      Otherwise, there is no VM default network.
                                    enum:
                                    - "True"
                                    - "False"
                                    type: string
                                required:
                                - name
                                - path
                                type: object
                                x-kubernetes-validations:
                                - message: path is immutable once set
                                  rule: '!has(oldSelf.path) || self.path == oldSelf.path'
                                - message: name is immutable once set
                                  rule: '!has(oldSelf.name) || self.name == oldSelf.name'
                              maxItems: 32
                              type: array
                              x-kubernetes-list-map-keys:
                              - name
                              x-kubernetes-list-type: map
                            vpc:
                              description: |-
                                vpc is the NSX policy path of an existing VPC the namespace is associated
                                with. When set, the namespace uses this pre-created VPC and
                                autoCreateConfig must not be set. This field is immutable once set.
                              maxLength: 2048
                              minLength: 1
                              type: string
                          type: object
                          x-kubernetes-validations:
                          - message: vpc and autoCreateConfig are mutually exclusive;
                              set vpc for pre-created VPC mode or autoCreateConfig
                              for auto-create VPC mode
                            rule: '!(has(self.vpc) && self.vpc != '''' && has(self.autoCreateConfig))'
                          - message: vpc is immutable once set
                            rule: '!has(oldSelf.vpc) || self.vpc == oldSelf.vpc'
                          - message: at most one sharedSubnet may have podDefault
                              set to True
                            rule: '!has(self.sharedSubnets) || self.sharedSubnets.filter(s,
                              has(s.podDefault) && s.podDefault == ''True'').size()
                              <= 1'
                          - message: at most one sharedSubnet may have vmDefault set
                              to True
                            rule: '!has(self.sharedSubnets) || self.sharedSubnets.filter(s,
                              has(s.vmDefault) && s.vmDefault == ''True'').size()
                              <= 1'
                          - message: vpc must be set when any sharedSubnet has podDefault
                              set to True
                            rule: '!has(self.sharedSubnets) || self.sharedSubnets.filter(s,
                              has(s.podDefault) && s.podDefault == ''True'').size()
                              == 0 || (has(self.vpc) && self.vpc != '''')'
                          - message: vpc must be set when any sharedSubnet has vmDefault
                              set to True
                            rule: '!has(self.sharedSubnets) || self.sharedSubnets.filter(s,
                              has(s.vmDefault) && s.vmDefault == ''True'').size()
                              == 0 || (has(self.vpc) && self.vpc != '''')'
                        vsphereDistributedConfig:
                          description: |-
                            vsphereDistributedConfig contains the vSphere Distributed (VDS) network
                            configuration. Required when type is vsphere-distributed.
                          properties:
                            defaultNetwork:
                              description: |-
                                defaultNetwork is the name of one of the entries in networks. The
                                generated Network corresponding to this entry is labeled
                                netoperator.vmware.com/is-default: "true", making it the network
                                resolved by workloads that do not explicitly select a network.

                                The referenced VSphereDistributedNetwork must not have an IP assignment
                                mode of None; a network with no IP assignment cannot serve as a workload
                                default.

                                This field is immutable once set and cannot be removed while Namespaces
                                are associated with this NamespaceNetworkConfiguration.
                              maxLength: 253
                              minLength: 1
                              pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                              type: string
                            networks:
                              description: |-
                                networks lists the VSphereDistributedNetwork resources to present inside
                                each associated Namespace. Each entry results in a corresponding Network
                                created inside each associated Namespace, with a reference to the
                                corresponding VSphereDistributedNetwork. When an entry is removed from
                                this list, the corresponding Network is deleted from all associated
                                Namespaces. At least one entry is required; the entry referenced by
                                defaultNetwork cannot be removed once Namespaces are associated
                                with this NamespaceNetworkConfiguration.
                              items:
                                description: |-
                                  VSphereDistributedNetworkRef is a reference to a VSphereDistributedNetwork
                                  resource by name.
                                properties:
                                  name:
                                    description: name is the name of the VSphereDistributedNetwork
                                      resource.
                                    maxLength: 253
                                    minLength: 1
                                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                                    type: string
                                required:
                                - name
                                type: object
                              maxItems: 32
                              minItems: 1
                              type: array
                              x-kubernetes-list-map-keys:
                              - name
                              x-kubernetes-list-type: map
                          required:
                          - defaultNetwork
                          - networks
                          type: object
                          x-kubernetes-validations:
                          - message: defaultNetwork must match the name of one of
                              the entries in networks
                            rule: self.networks.exists(n, n.name == self.defaultNetwork)
                          - message: defaultNetwork is immutable once set
                            rule: oldSelf.defaultNetwork == '' || self.defaultNetwork
                              == oldSelf.defaultNetwork
                      type: object
                    type:
                      description: type identifies the network provider for this entry.
                      enum:
                      - vsphere-distributed
                      - nsx-tier1
                      - vpc
                      type: string
                  required:
                  - systemConfiguration
                  - type
                  type: object
                  x-kubernetes-validations:
                  - message: only vsphere-distributed and vpc are currently supported;
                      nsx-tier1 will be introduced in a future version
                    rule: self.type == 'vsphere-distributed' || self.type == 'vpc'
                  - message: systemConfiguration.vsphereDistributedConfig must be
                      set when type is vsphere-distributed
                    rule: self.type != 'vsphere-distributed' || has(self.systemConfiguration.vsphereDistributedConfig)
                  - message: systemConfiguration.vsphereDistributedConfig may only
                      be set when type is vsphere-distributed
                    rule: self.type == 'vsphere-distributed' || !has(self.systemConfiguration.vsphereDistributedConfig)
                  - message: systemConfiguration.vpcConfig must be set when type is
                      vpc
                    rule: self.type != 'vpc' || has(self.systemConfiguration.vpcConfig)
                  - message: systemConfiguration.vpcConfig may only be set when type
                      is vpc
                    rule: self.type == 'vpc' || !has(self.systemConfiguration.vpcConfig)
                maxItems: 3
                minItems: 1
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            required:
            - activeSystemProvider
            - providers
            type: object
            x-kubernetes-validations:
            - message: activeSystemProvider must reference a provider type declared
                in providers
              rule: self.providers.exists(p, p.type == self.activeSystemProvider)
          status:
            description: status describes the observed state of this WorkloadNetworkConfiguration.
            properties:
              conditions:
                description: |-
                  conditions represents the latest available observations of the
                  WorkloadNetworkConfiguration's current state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                maxItems: 8
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: WorkloadNetworkConfiguration must be named 'default'
          rule: self.metadata.name == 'default'
    served: true
    storage: true
    subresources:
      status: {}
