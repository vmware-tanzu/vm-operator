deploymentOptionSection:
  configuration:
  - description: |2-

      IMPORTANT: Small VM appliance size is suitable for lab and proof-of-concept deployment

      This configuration requires the following:
      * 4 vCPU
      * 16GB RAM
      * 300GB Storage
      * VM hardware version 10 or greater (vSphere 5.5 or greater)
    id: small
    label: Small
  - default: true
    description: |2-

      IMPORTANT: This configuration is supported for Local Manager Production deployment ('NSX Manager' role)
                 This is supported for Global Manager Production deployment

      This configuration requires the following:
      * 6 vCPU
      * 24GB RAM
      * 300GB Storage
      * VM hardware version 10 or greater (vSphere 5.5 or greater)
    id: medium
    label: Medium
  - description: |2-

      IMPORTANT: This configuration is supported for Local Manager Production deployment ('NSX Manager' role)
                 This is supported for Global Manager Production deployment

      This configuration requires the following:
      * 12 vCPU
      * 48GB RAM
      * 300GB Storage
      * VM hardware version 10 or greater (vSphere 5.5 or greater)
    id: large
    label: Large
  - description: |2-

      IMPORTANT: This configuration is supported for Local Manager Production deployment ('NSX Manager' role)
                 This is supported for Global Manager Production deployment

      This configuration requires the following:
      * 24 vCPU
      * 96GB RAM
      * 400GB Storage
      * VM hardware version 10 or greater (vSphere 5.5 or greater)
    id: xlarge
    label: ExtraLarge
  info: The list of deployment options
diskSection:
  disk:
  - capacity: "200"
    capacityAllocationUnits: byte * 2^30
    diskId: system
    fileRef: nsx-unified-appliance.vmdk_id
    format: http://www.vmware.com/interfaces/specifications/vmdk.html#streamOptimized
    populatedSize: 4312137728
  - capacity: "102400"
    capacityAllocationUnits: byte * 2^20
    diskId: secondary
    format: http://www.vmware.com/interfaces/specifications/vmdk.html#streamOptimized
  - capacity: "102400"
    capacityAllocationUnits: byte * 2^20
    diskId: disk100GB
    format: http://www.vmware.com/interfaces/specifications/vmdk.html#streamOptimized
  info: List of the virtual disks and partitions needed
networkSection:
  info: List of logical networks used in the package
  network:
  - description: Network 1
    name: Network 1
