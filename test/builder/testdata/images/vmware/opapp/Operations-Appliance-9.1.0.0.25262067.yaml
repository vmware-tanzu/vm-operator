deploymentOptionSection:
  configuration:
  - description: Use this configuration for environments between 700 and 10000 VMs.
      This deployment will require 4 vCPUs and 16GB Memory for the vApp. For more
      detailed sizing information please visit https://knowledge.broadcom.com/external/article?articleNumber=324340
    id: small
    label: Small
  - description: Use this configuration for environments between 10000 and 30000 VMs.
      This deployment will require 8 vCPUs and 32GB Memory for the vApp. For more
      detailed sizing information please visit https://knowledge.broadcom.com/external/article?articleNumber=324340
    id: medium
    label: Medium
  - description: Use this configuration for environments between 30000 and 44000  VMs.
      This deployment will require 16 vCPUs and 48GB Memory for the vApp. For more
      detailed sizing information please visit https://knowledge.broadcom.com/external/article?articleNumber=324340
    id: large
    label: Large
  - description: Use this configuration to deploy a witness node for CA enabled clusters.
      This deployment will require 2 vCPUs and 8GB Memory for the vApp. For more detailed
      sizing information please visit https://knowledge.broadcom.com/external/article?articleNumber=324340
    id: witness
    label: Witness
  - description: Use this configuration for environments up to 700 VMs. This deployment
      will require 2 vCPUs and 8GB Memory for the vApp. For more detailed sizing information
      please visit https://knowledge.broadcom.com/external/article?articleNumber=324340
    id: xsmall
    label: Extra Small
  - description: Use this configuration for environments between 44000 and 100000
      VMs. This deployment will require 24 vCPUs and 128GB Memory for the vApp. For
      more detailed sizing information please visit https://knowledge.broadcom.com/external/article?articleNumber=324340
    id: xlarge
    label: Extra Large
  info: The list of deployment options
