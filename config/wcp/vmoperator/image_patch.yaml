apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
      - name: manager
        image: vmware/vmop:0.0.1
        imagePullPolicy: IfNotPresent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-console-validator
  namespace: system
spec:
  template:
    spec:
      containers:
      - name: web-console-validator
        image: vmware/vmop:0.0.1
        imagePullPolicy: IfNotPresent
