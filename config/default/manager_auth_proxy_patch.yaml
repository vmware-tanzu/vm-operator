# This patch configures the controller manager to serve metrics over
# HTTPS with built-in authentication and authorization via
# controller-runtime, replacing the deprecated kube-rbac-proxy sidecar.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
      - name: manager
        args:
        - "--metrics-addr=:8443"
        ports:
        - containerPort: 8443
          name: metrics-server
